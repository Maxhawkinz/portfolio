<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ajay Thakare — Android & Backend Engineer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Bitcount+Grid+Single+Ink&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #181818;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8f060;
      --accent2: #60f0c8;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --font-bit: 'Bitcount Grid Single Ink', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      overflow-x: hidden;
      cursor: none;
    }

    /* CURSOR */
    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: width 0.2s, height 0.2s;
    }

    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(200,240,96,0.35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, opacity 0.3s;
    }

    .cursor.hover {
      width: 20px;
      height: 20px;
    }

    .cursor-ring.hover {
      width: 58px;
      height: 58px;
      opacity: 0.5;
    }

    /* NOISE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.3rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
    }

    .nav-logo {
      font-family: var(--font-bit);
      font-size: 1.2rem;
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8rem 3rem 2rem;
    }

    .hero h1 {
      font-size: 3rem;
      line-height: 1.2;
    }

    .hero span {
      color: var(--accent);
    }

    .hero p {
      margin-top: 1rem;
      color: var(--muted);
      max-width: 600px;
    }

    /* BUTTON */
    .btn {
      margin-top: 2rem;
      padding: 0.8rem 1.5rem;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: var(--accent);
      color: black;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      margin-top: 4rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

<div class="cursor"></div>
<div class="cursor-ring"></div>

<nav>
  <div class="nav-logo">AJAY</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Projects</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Hi, I'm <span>Ajay Thakare</span></h1>
  <p>Android & Backend Developer focused on building scalable apps and modern web experiences.</p>
  <button class="btn">View Work</button>
</section>

<footer>
  © 2026 Ajay Thakare
</footer>

<script>
  const cursor = document.querySelector(".cursor");
  const ring = document.querySelector(".cursor-ring");

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
    ring.style.left = e.clientX + "px";
    ring.style.top = e.clientY + "px";
  });

  document.querySelectorAll("a, button").forEach(el => {
    el.addEventListener("mouseenter", () => {
      cursor.classList.add("hover");
      ring.classList.add("hover");
    });

    el.addEventListener("mouseleave", () => {
      cursor.classList.remove("hover");
      ring.classList.remove("hover");
    });
  });
</script>

</body>
</html>
